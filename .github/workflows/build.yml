name: Build .exe

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: importadora

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: importadora/package-lock.json

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: importadora-installer
          path: importadora/src-tauri/target/release/bundle/nsis/*.exe
